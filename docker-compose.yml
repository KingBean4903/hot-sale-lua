version: "3.9"

services:
  redis:
    image: redis:7.4.8-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data-8:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  redis-data-8:

